<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Authorization - MUSE Social Publisher</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fc; color: #333; display: flex; flex-direction: column; min-height: 100vh; }
        nav { background: white; border-bottom: 1px solid #e5e7eb; padding: 16px 40px; }
        nav .logo { font-size: 1.3em; font-weight: 700; color: #1a1a2e; text-decoration: none; }
        nav .logo span { color: #6366f1; }
        .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .card { background: white; border-radius: 16px; padding: 48px 40px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); max-width: 480px; width: 100%; text-align: center; }
        .icon { font-size: 3em; margin-bottom: 16px; }
        .card h1 { font-size: 1.5em; color: #1a1a2e; margin-bottom: 12px; }
        .card p { color: #666; line-height: 1.6; margin-bottom: 24px; }
        .status { display: inline-block; padding: 8px 20px; border-radius: 20px; font-size: 0.9em; font-weight: 600; }
        .status.success { background: #ecfdf5; color: #059669; }
        .status.error { background: #fef2f2; color: #dc2626; }
        .status.loading { background: #eff6ff; color: #2563eb; }
        .code-box { background: #f1f5f9; border-radius: 8px; padding: 12px 16px; margin: 16px 0; font-family: monospace; font-size: 0.85em; color: #475569; word-break: break-all; text-align: left; }
        .btn { display: inline-block; padding: 12px 28px; background: #6366f1; color: white; border-radius: 8px; text-decoration: none; font-weight: 500; margin-top: 16px; }
        .btn:hover { background: #4f46e5; }
    </style>
</head>
<body>
    <nav>
        <a href="/musetrendytoy/" class="logo"><span>MUSE</span> Social Publisher</a>
    </nav>
    <div class="main">
        <div class="card" id="callback-card">
            <div class="icon" id="icon">&#8987;</div>
            <h1 id="title">Processing Authorization...</h1>
            <p id="message">Please wait while we complete the TikTok connection.</p>
            <span class="status loading" id="status">Connecting...</span>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');
        const state = params.get('state');

        const icon = document.getElementById('icon');
        const title = document.getElementById('title');
        const message = document.getElementById('message');
        const status = document.getElementById('status');
        const card = document.getElementById('callback-card');

        if (error) {
            icon.textContent = '\u274C';
            title.textContent = 'Authorization Failed';
            message.textContent = 'TikTok authorization was denied or an error occurred. Please try again.';
            status.textContent = 'Error: ' + (params.get('error_description') || error);
            status.className = 'status error';
        } else if (code) {
            icon.textContent = '\u2705';
            title.textContent = 'TikTok Connected!';
            message.textContent = 'Your TikTok account has been successfully connected to MUSE Social Publisher. You can now publish content to your TikTok profile.';
            status.textContent = 'Connected Successfully';
            status.className = 'status success';

            const codeBox = document.createElement('div');
            codeBox.className = 'code-box';
            codeBox.textContent = 'Authorization code received. Your backend will exchange this for an access token.';
            card.appendChild(codeBox);

            const btn = document.createElement('a');
            btn.href = '/musetrendytoy/';
            btn.className = 'btn';
            btn.textContent = 'Go to Dashboard';
            card.appendChild(btn);
        } else {
            icon.textContent = '\u2139\uFE0F';
            title.textContent = 'TikTok Authorization';
            message.textContent = 'This page handles TikTok OAuth callbacks. Please start the connection process from the dashboard.';
            status.textContent = 'Waiting';
            status.className = 'status loading';

            const btn = document.createElement('a');
            btn.href = '/musetrendytoy/';
            btn.className = 'btn';
            btn.textContent = 'Go to Dashboard';
            card.appendChild(btn);
        }
    </script>
</body>
</html>
